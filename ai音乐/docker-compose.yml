services:
  next-app:
    build:
      context: ./ai-music-app
      dockerfile: Dockerfile
    container_name: ai-music-app
    ports:
      - "3000:3000"
    restart: always
    environment:
      - NODE_ENV=production
      - MINIMAX_API_KEY=${MINIMAX_API_KEY}
      - MINIMAX_BASE_URL=${MINIMAX_BASE_URL}
